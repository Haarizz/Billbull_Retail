# Production logging defaults for ERP deployments.
# Run with SPRING_PROFILES_ACTIVE=prod to avoid huge SQL log files.
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

app.logging.slow-request-threshold-ms=2000
app.audit.auto-log-mutating-requests=true

# SECURITY: in prod the JWT secret MUST come from the environment with NO fallback.
# If JWT_SECRET is unset, startup fails fast rather than booting with a known dev key.
jwt.secret=${JWT_SECRET}
