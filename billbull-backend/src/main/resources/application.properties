spring.application.name=billbull-backend

# ===============================
# COMMON SERVER CONFIG
# ===============================
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

# ===============================
# COMMON DB DRIVER
# ===============================
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=50
# ARCHFIX §4.4 — JDBC insert/update batching (works with SEQUENCE PKs; no-op with IDENTITY).
# order_inserts/updates groups same-type inserts so the driver can batch them together.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ===============================
# Flyway (versioned migrations — ARCHFIX P0 §1.1)
# ===============================
# Coexistence strategy: ddl-auto stays 'update' for now, so Hibernate still owns table
# creation on fresh DBs. Flyway carries ADDITIVE, IDEMPOTENT fixes (indexes, constraints,
# type widenings) guarded so they no-op when an object is absent. baseline-on-migrate lets
# Flyway adopt an existing populated tenant DB without replaying history.
# NOTE: Spring runs Flyway BEFORE Hibernate; every script must tolerate a not-yet-created
# table (see the plpgsql to_regclass guards in db/migration/*.sql).
#
# ENABLED: the flyway-core + flyway-database-postgresql jars are now declared in pom.xml and
# present in the local Maven repo. Flyway runs the db/migration/*.sql scripts at boot, BEFORE
# Hibernate. ddl-auto stays 'update' for safe coexistence; flip to 'validate' per-tenant once
# every tenant DB has been baselined by Flyway.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

# ===============================
# Hikari Connection Pool
# ===============================
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ===============================
# Jackson
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Dubai

# ===============================
# JWT
# ===============================
# SECURITY: the signing secret MUST be supplied per-deployment via the JWT_SECRET
# environment variable (or an external secret manager). The literal fallback below is a
# DEV-ONLY default and must never be used in any shared/tenant deployment — anyone with
# the value can forge tokens for that database. Rotate per tenant. (ARCHFIX P0 §1.5 / S1)
jwt.secret=${JWT_SECRET:billbull-super-secret-key-32chars-minimum!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.max-file-size=300MB
spring.servlet.multipart.max-request-size=300MB
server.tomcat.max-swallow-size=-1
upload.path=uploads/

# ===============================
# RBAC
# ===============================
rbac.enabled=true
rbac.user-management.enabled=true
rbac.hr.enabled=true
rbac.customer.enabled=true
rbac.finance.enabled=true
rbac.inventory.enabled=true
rbac.purchases.enabled=true
rbac.sales.enabled=true
rbac.dashboard.enabled=true
rbac.notification.enabled=true
rbac.tally.enabled=false

# ===============================
# Audit
# ===============================
rbac.audit.enabled=true
rbac.audit.log-allowed=true
rbac.audit.log-denied=true
# ARCHFIX §1.12 — audit_logs retention. 0 (default) = keep forever (historical behaviour).
# Set to a positive number of months (e.g. 24) to have AuditLogRetentionJob purge older rows nightly.
audit.retention.months=0

# Phase B.5 — print job dispatch timeout (minutes). A job left DISPATCHED longer than this with
# no reported result is recovered as FAILED (never auto-requeued — see PosPrintJobTimeoutSweepJob).
pos.printjob.dispatch-timeout-minutes=5

# Phase C — a device with no health heartbeat for longer than this (minutes) is marked OFFLINE.
# See PosDeviceHealthSweepJob.
pos.device.health-offline-threshold-minutes=5

# ===============================
# Branch-Level Inventory (Topic 1)
# ===============================
# Master switch for branch-scoped inventory reads. DEFAULT OFF — when false the system behaves
# exactly as before (no branch filtering of inventory lists/aggregates). Turned on per tenant in
# the tenant profile once validated (same convention as rbac.<module>.enabled). Phases 1–2
# (schema + write-path branch stamping) are always active and behaviour-neutral; only the
# read-path scoping introduced in Phase 3+ consults this flag.
inventory.branch-scope.enabled=false

# Master-Data Governance (Phase 6B). Governs who may CREATE a global (null-branch) master item
# vs. a branch-private one. Only consulted when inventory.branch-scope.enabled=true. Visibility of
# existing global rows is unchanged and not configurable.
#   creation-enabled=false → nobody may create global master data (every create is branch-stamped).
#   creation-enabled=true  → a caller whose role is in allowed-roles may create a global (null) row;
#                            everyone else's create is stamped with their active branch.
# allowed-roles uses EXISTING RBAC role names (BRANCH_MANAGER is intentionally NOT included — it is
# not a role in this system). Override per tenant in the tenant profile.
inventory.global-master.creation-enabled=true
inventory.global-master.allowed-roles=SUPER_ADMIN,ADMIN,BRANCH_ADMIN

# ===============================
# User-Based Data Visibility / Ownership Filtering (Topic 2)
# ===============================
# Master switch for ownership filtering — a user sees only the transactions they created (owner-only)
# or created/act-on (owner-or-assignee for multi-actor docs), composed as AND on top of branch scope.
# DEFAULT OFF — when false the system behaves exactly as before (no ownership filtering anywhere);
# JwtFilter marks every principal viewAll=true so the OwnershipAccessService short-circuits. Turn on
# per tenant in the tenant profile once validated (same convention as rbac.<module>.enabled and
# inventory.branch-scope.enabled). Phase 1–2 (created_by_user_id schema + write-path owner stamping)
# are always active and behaviour-neutral; only read-path scoping consults this flag.
#
# Override: ADMIN/BRANCH_ADMIN/SUPER_ADMIN always bypass filtering; any other role bypasses only if
# granted the permissions.records.view-all pseudo-permission (seeded to MANAGER/SUPERVISOR by default
# in RolePermissionInitializer, editable in Roles & Permissions).
ownership.filtering.enabled=false

# ===============================
# Financial Controls (Phase 8.5)
# ===============================
# Manual JVs above this threshold require a second approver before posting.
# Set to 0 to disable the threshold (all JVs go straight to Draft).
financials.jv.approval-threshold-aed=10000
