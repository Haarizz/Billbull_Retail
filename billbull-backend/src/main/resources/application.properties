spring.application.name=billbull-backend
# ===============================
# Server Configuration
# ===============================
server.port=8080
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

# ===============================
# Database Configuration
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/test
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=50

# ===============================
# Jackson Configuration
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false

# ===============================
# JWT Configuration
# ===============================
jwt.secret=billbull-super-secret-key-32chars-minimum!!
jwt.expiration=86400000

# ===============================
# File Upload Configuration
# ===============================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
upload.path=uploads/

# ===============================
# RBAC Feature Toggles (Phase 0: All disabled initially)
# ===============================
rbac.enabled=true
rbac.user-management.enabled=true
rbac.hr.enabled=true
rbac.customer.enabled=true
rbac.finance.enabled=true
rbac.inventory.enabled=true
rbac.purchases.enabled=true
rbac.sales.enabled=true
rbac.dashboard.enabled=true
rbac.tally.enabled=false

# ===============================
# Audit Logging Configuration
# ===============================
rbac.audit.enabled=true
rbac.audit.log-allowed=true
rbac.audit.log-denied=true